<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合成大GB</title>

    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/favicon/site.webmanifest">
    <meta name="theme-color" content="#b75b64">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css" version="0.14.0">
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/GSDevTools.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.mjs"
        }
    }
    </script>
</head>
<body>
    <!-- 全局头像网格背景 -->
    <div id="loading-bg-container">
        <div class="loading-bg-text-bg"></div>
        <div class="loading-bg-coutinue-text">TOUCH TO CONTINUE</div>
    </div>

    <div id="loading-screen">
        <div class="loading-container">
            <div class="loading-ring">
                <span class="loading-dot-wrap"><span class="loading-dot"></span></span>
                <span class="loading-dot-wrap"><span class="loading-dot"></span></span>
                <span class="loading-dot-wrap"><span class="loading-dot"></span></span>
                <span class="loading-dot-wrap"><span class="loading-dot"></span></span>
                <span class="loading-dot-wrap"><span class="loading-dot"></span></span>
            </div>
            <div class="loading-progress-wrap">
                <div class="loading-progress-track">
                    <div class="loading-progress-fill"></div>
                </div>
            </div>
            <div class="loading-info">
                <span class="loading-item-name">准备中...</span>
                <span class="loading-counter">0/0</span>
            </div>
        </div>
    </div>

    <!-- 加载完成后合并的主菜单页面 -->
    <div id="main-menu" class="hidden">
        <div class="start-content">
            <img class="title-image" src="images/0-title.png" alt="合成大GB">
            <button id="start-btn" class="start-btn-main">开始游戏</button>
            <button id="records-btn" class="start-btn-main">本地排行</button>
            <button id="about-btn" class="start-btn-main">关于游戏</button>
        </div>
        <button id="settings-btn" class="settings-btn"></button>
    </div>

    <div id="settings-screen" class="hidden">
        <div class="modal-bg-deco"></div>
        <div class="modal-content records-content">
            <div class="modal-stamp">SETTINGS</div>
            <h1>设置</h1>
            <div class="score-stars"></div>
            <div class="settings-body">
                <div class="setting-row">
                    <label class="setting-label">音效</label>
                    <input type="range" id="sfx-volume" class="volume-slider" min="0" max="100" value="50" />
                </div>
                <div class="setting-row">
                    <label class="setting-label">音乐</label>
                    <input type="range" id="music-volume" class="volume-slider" min="0" max="100" value="50" />
                </div>
            </div>
            <button class="modal-btn modal-btn-purple" id="close-settings-btn">返回</button>
        </div>
    </div>

    <div id="pixi-container" class="hidden"></div>

    <div id="pause-screen" class="hidden">
        <div class="modal-bg-deco"></div>
        <div class="modal-content">
            <div class="modal-stamp">PAUSE</div>
            <h1>游戏暂停</h1>
            <div class="score-stars"></div>
            <div class="pause-volume-body">
                <div class="setting-row">
                    <label class="setting-label">音效</label>
                    <input type="range" id="pause-sfx-volume" class="volume-slider" min="0" max="100" value="50" />
                </div>
                <div class="setting-row">
                    <label class="setting-label">音乐</label>
                    <input type="range" id="pause-music-volume" class="volume-slider" min="0" max="100" value="50" />
                </div>
            </div>
            <div class="pause-buttons">
                <button id="resume-btn" class="modal-btn modal-btn-primary">继续游戏</button>
                <button id="pause-restart-btn" class="modal-btn modal-btn-secondary">重新开始</button>
                <button class="modal-btn modal-btn-purple" id="quit-btn-1">结束游戏</button>
            </div>
        </div>
    </div>

    <div id="records-screen" class="hidden">
        <div class="modal-bg-deco"></div>
        <div class="modal-content records-content">
            <div class="modal-stamp">RECORDS</div>
            <h1>本地排行</h1>
            <div class="score-stars"></div>
            <div class="records-table-wrap">
                <table id="records-table">
                    <thead>
                        <tr><th>排名</th><th>分数</th><th>时长</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="records-scroll-hint"></div>
            <div class="records-footer">*分数仅保存在本地</div>
            <button class="modal-btn modal-btn-purple" id="close-records-btn">返回</button>
        </div>
    </div>

    <div id="about-screen" class="hidden">
        <div class="modal-bg-deco"></div>
        <div class="modal-content records-content">
            <div class="modal-stamp">ABOUT</div>
            <h1>关于游戏</h1>
            <div class="score-stars"></div>
            <div class="about-info">
                <p class="about-line">合成大GB</p>
                <p class="about-line">同类水果合成，不断升级</p>
                <p class="about-line">触碰到顶部危险线即告失败</p>
                <p class="about-line">合理利用 UFO 技能扭转战局</p>
            </div>
            <button class="modal-btn modal-btn-purple btn-about-close" id="close-about-btn">返回</button>
        </div>
    </div>

    <div id="game-over-modal">
        <div class="modal-bg-deco"></div>
        <div class="modal-content">
            <div class="modal-stamp">GAME OVER</div>
            <h1>游戏结束</h1>
            <div class="score-stars"></div>
            <div id="final-score-wrap" class="final-score-wrap">
                <div id="final-score" class="score-display">0</div>
                <span id="new-record-tag" class="new-record-tag hidden">NEW RECORD</span>
            </div>
            <div id="game-stats" class="game-stats">
                <div class="stat-row">
                    <span class="stat-label">游戏时间</span>
                    <span id="game-duration">0:00</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">分数名次</span>
                    <span id="score-rank">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">最高记录</span>
                    <span id="highest-record">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">GB数量</span>
                    <span id="gb-count">0</span>
                </div>
            </div>
            <div class="pause-buttons">
                <button id="restart-btn" class="modal-btn modal-btn-primary">再来一局</button>
                <button class="modal-btn modal-btn-purple" id="quit-btn-2">返回主页</button>
            </div>
        </div>
    </div>


    <div class="version-tag">v0.14.0 by zozou</div>
    <script type="module" src="js/main.js" version="0.14.0"></script>   
</body>
</html>
